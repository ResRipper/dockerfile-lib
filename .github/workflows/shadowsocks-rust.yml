name: Shadowsocks-rust

on:
  push:
    paths:
      - network/shadowsocks/dockerfile
      - .github/workflows/shadowsocks-rust.yml
  workflow_dispatch:
    inputs:
      push:
        description: Push image to registry
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      push:
        description: Push image to registry
        required: true
        type: boolean
        default: false

env:
  SS_VER: 1.24.0
  V2RAY_VER: 5.49.0

jobs:
  ss-rust:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch repo
        uses: actions/checkout@v6

      - name: Setup Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (and publish)
        uses: docker/build-push-action@v7
        id: image-builder
        with:
          context: network/shadowsocks
          file: network/shadowsocks/dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push == true }}
          load: true
          tags: resripper/shadowsocks-rust:${{ env.SS_VER }}, resripper/shadowsocks-rust:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SS_VER=${{ env.SS_VER }}
            V2RAY_VER=${{ env.V2RAY_VER }}

      - name: List image
        run: |
          docker image list \
          docker image inspect resripper/shadowsocks-rust:latest

      - name: Scan image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ steps.image-builder.outputs.digest }}
          fail-build: false
          only-fixed: true

      - name: Upload scan report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}