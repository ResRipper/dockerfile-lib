name: Caddy-custom

on:
  push:
    paths:
      - network/caddy-custom/dockerfile
      - .github/workflows/caddy-custom.yml
  workflow_dispatch:
    inputs:
      push:
        description: Push image to registry
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      push:
        description: Push image to registry
        required: true
        type: boolean
        default: false

env:
  ALPINE_VER: latest
  CADDY_VER: 2.11.3
  MOD_CF: 0.2.4
  MOD_DOCKER_PROXY: 2.12.0

jobs:
  caddy-custom-slim:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: write

    steps:
      - name: Fetch repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (and push)
        uses: docker/build-push-action@v7
        with:
          context: network/caddy-custom
          file: network/caddy-custom/dockerfile
          platforms: linux/amd64,linux/arm64
          tags: resripper/caddy-custom:${{ env.CADDY_VER }}, resripper/caddy-custom:${{ env.CADDY_VER }}-slim, resripper/caddy-custom:latest
          push: ${{ inputs.push == true }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CADDY_VER=${{ env.CADDY_VER }}
            IMAGE_BASE=scratch

      - name: Scan image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: resripper/caddy-custom:${{ env.CADDY_VER }}-slim
          fail-build: false

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  caddy-custom-alpine:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: write

    steps:
      - name: Fetch repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (and push)
        uses: docker/build-push-action@v7
        with:
          context: network/caddy-custom
          file: network/caddy-custom/dockerfile
          platforms: linux/amd64,linux/arm64
          tags: resripper/caddy-custom:${{ env.CADDY_VER }}-alpine
          push: ${{ inputs.push == true }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CADDY_VER=${{ env.CADDY_VER }}
            IMAGE_BASE=alpine:${{ env.ALPINE_VER }}

      - name: Scan image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: resripper/caddy-custom:${{ env.CADDY_VER }}-alpine
          fail-build: false

      - name: Upload scan report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}