name: Builder

on:
    workflow_dispatch:
        inputs:
            image:
                description: Target image to be build
                type: string
                required: true
            tag:
                description: Image tag
                type: string
                required: true
            platform:
                description: Target platform and architecture
                type: string
                default: linux/amd64,linux/arm64
            build_args:
                description: Docker build args
                type: string
                default: ''
            latest:
                description: Build as latest tag
                type: boolean
                default: true
            push:
                description: Push image to registry
                type: boolean
                default: false
            scan:
                description: Scan image for vulnerabilities
                type: boolean
                default: false
    workflow_call:
        inputs:
            image:
                description: Target image to be build
                type: string
                required: true
            tag:
                description: Image tag
                type: string
                required: true
            platform:
                description: Target platform and architecture
                type: string
                default: linux/amd64,linux/arm64
            build_args:
                description: Docker build args
                type: string
                default: ''
            latest:
                description: Build as latest tag
                type: boolean
                default: true
            push:
                description: Push image to registry
                type: boolean
                default: false
            scan:
                description: Scan image for vulnerabilities
                type: boolean
                default: false

jobs:
    builder:
        name: Build - ${{ inputs.image }}:${{ inputs.tag }}
        runs-on: ubuntu-latest
        steps:
            -   name: Fetch repo
                uses: actions/checkout@v6

            -   name: Login to Docker Hub
                uses: docker/login-action@v4
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            -   name: Setup QEMU
                uses: docker/setup-qemu-action@v4

            -   name: Setup Buildx
                uses: docker/setup-buildx-action@v4

            -   name: Set image tags
                run: |
                    IMAGE_TAGS="resripper/${{ inputs.image }}:${{ inputs.tag }}"
                    if [ ${{ inputs.latest }} == true ]; then
                        IMAGE_TAGS="${IMAGE_TAGS}, resripper/${{ inputs.image }}:latest"
                    fi
                    echo IMAGE_TAGS="${IMAGE_TAGS}" >> "$GITHUB_ENV"

            -   name: Build image (and push)
                uses: docker/build-push-action@v7
                env:
                    DOCKER_BUILD_RECORD_UPLOAD: false
                with:
                    context: ${{ inputs.image }}
                    file: ${{ inputs.image }}/dockerfile
                    platforms: ${{ inputs.platform }}
                    push: ${{ inputs.push == true }}
                    tags: ${{ env.IMAGE_TAGS }}
                    build-args: ${{ inputs.build_args }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max

            -   name: Scan image
                id: scan
                if: ${{ inputs.scan == true }}
                uses: anchore/scan-action@v7
                with:
                    image: resripper/${{ inputs.image }}:${{ inputs.tag }}
                    fail-build: false
                    only-fixed: true

            -   name: Upload scan report
                if: ${{ inputs.scan == true }}
                uses: github/codeql-action/upload-sarif@v4
                with:
                    sarif_file: ${{ steps.scan.outputs.sarif }}