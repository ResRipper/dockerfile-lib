name: Build scheduler

on:
    workflow_dispatch:
        inputs:
            push:
                type: boolean
                default: false
    # schedule:
    #     - cron: "0 0 1 * *"

jobs:
    # caddy-custom:
    #     uses: ./.github/workflows/caddy-custom.yml
    #     with:
    #         push: true

    # grav:
    #     uses: ./.github/workflows/grav.yml
    #     with:
    #         push: true

    builder:
        strategy:
            fail-fast: true
            matrix:
                include:
                    -   image: shadowsocks-rust
                        tag: 1.24.0
                        build_args: |
                            SS_VER=1.24.0
                            V2RAY_VER=5.49.0
        uses: ./.github/workflows/builder.yml
        secrets: inherit
        with:
            image: ${{ matrix.image }}
            tag: ${{ matrix.tag }}
            build_args: ${{ matrix.build_args }}
            push: ${{ inputs.push == true }}

    scanner:
        needs: [builder]
        uses: ./.github/workflows/scanner.yml
        with:
            image: ${{ needs.builder.outputs.image }}