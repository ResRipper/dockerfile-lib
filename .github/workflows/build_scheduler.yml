name: Build scheduler

on:
    workflow_dispatch:
        inputs:
            push:
                type: boolean
                required: true
                default: true
            scan:
                type: boolean
                required: true
                default: true
    schedule:
        - cron: 0 0 * * 5

jobs:
    builder:
        strategy:
            fail-fast: true
            matrix:
                include:
                    -   image: shadowsocks-rust
                        tag: 1.24.0
                        build_args: |
                            SS_VER=1.24.0
                            V2RAY_VER=5.49.0

                    -   image: grav
                        tag: 1.7.52
                        build_args: |
                            ALPINE_VER=latest
                            GRAV_VER=1.7.52

                    -   image: caddy-custom
                        tag: 2.11.4
                        build_args: |
                            IMAGE_BASE=scratch
                            CADDY_VER=2.11.4
                            MOD_CF=0.2.4
                            MOD_DOCKER_PROXY=2.12.1

                    -   image: caddy-custom
                        tag: 2.11.4-alpine
                        latest: false
                        build_args: |
                            IMAGE_BASE=alpine:latest
                            CADDY_VER=2.11.4
                            MOD_CF=0.2.4
                            MOD_DOCKER_PROXY=2.12.1

        uses: ./.github/workflows/builder.yml
        secrets: inherit
        with:
            image: ${{ matrix.image }}
            tag: ${{ matrix.tag }}
            build_args: ${{ matrix.build_args }}
            push: ${{ inputs.push == true }}
            scan: ${{ inputs.scan == true }}